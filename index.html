<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnt App</title>
    <link rel="stylesheet" href="/src/forms.css">
</head>

<body>
    <h1>Hello, Dnt!</h1>
    <script type="module" src="/src/forms.ts"></script>

    <form data-form-process="order" novalidate class="form-order">
        <input type="hidden" name="title" value="Заказать поездку">
        <div class="form-group" data-app-form-suggest></div>

        <div class="form-group">
            <div class="form-control form-control_floating form-control_clearable">
                <input type="tel" name="phone" required id="modal-order-phone" autocomplete="tel" tabindex="0">
                <label>Укажите Ваш телефон</label>
            </div>
        </div>

        <label class="form-check__label form-accept">
            <span class="form-check">
                <input type="checkbox" name="accept" required>
                <dnt-icon icon="check"></dnt-icon>
                <span class="invalid-tooltip">Необходимо согласиться с политикой</span>
            </span>
            <span>Нажимая кнопку «Отправить» я даю свое <a href="" target="_blank">согласие</a> на
                обработку <a href="" target="_blank">персональных
                    данных</a></span>
        </label>
        <button class="btn btn-contrast">Получить рассчет</button>
    </form>

    <script>
    </script>
</body>

</html>
